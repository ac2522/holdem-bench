# Phase 1.5 smoke — all seats via OpenRouter (single API key needed).
#
# Use this when you only have an OpenRouter key:
#
#   ~/.holdembench/credentials.toml:
#     [openrouter]
#     api_key  = "sk-or-..."
#     base_url = "https://openrouter.ai/api/v1"
#
# Run:
#   uv run holdembench run --config evals/smoke-openrouter-only.yaml --seed 2026 --real-time
#
# Tradeoff vs smoke-cheap-tier.yaml: native adapter paths (Anthropic
# cache_control, Google schema validation) are not exercised; everything
# goes through the OpenAI-compat OpenRouter adapter.  Pipeline end-to-end
# correctness is fully validated.

