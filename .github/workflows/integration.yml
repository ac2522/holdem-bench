name: integration
on:
  push:
    branches: [main]
  pull_request:

jobs:
  stub-tournament:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { python-version: "3.12" }
      - run: uv sync --frozen --all-extras
      - run: uv run pytest tests/integration -v --runslow
